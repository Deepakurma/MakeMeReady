version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: makemeready-db
    environment:
      POSTGRES_USER: makeuser
      POSTGRES_PASSWORD: makepassword
      POSTGRES_DB: makemereadydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
